# MySQL 연결값은 local.properties 또는 환경변수(MYSQL_URL 등)에서만 주입합니다.
spring.datasource.url=${MYSQL_URL:${app.datasource.mysql.url}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:${app.datasource.mysql.username}}
spring.datasource.password=${MYSQL_PASSWORD:${app.datasource.mysql.password}}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
