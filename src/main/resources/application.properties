spring.config.import=optional:file:./local.properties

server.port=${SERVER_PORT:5000}

# -------------------------------------------------------
# 기본 커밋 설정 (민감정보 없음)
# 실제 실행값은 루트 local.properties 에서 덮어쓰세요.
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/chestbot;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -------------------------------------------------------
# JPA / Hibernate
# ddl-auto=update → 로컬 H2/MySQL 스키마 자동 생성/업데이트
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# 로깅
# -------------------------------------------------------
logging.level.org.hibernate.SQL=warn
logging.level.com.example.chestbot.service.LogMigrationRunner=info
server.error.include-message=always

spring.application.name=changojigi-discord-bot

# -------------------------------------------------------
# 관리자 대시보드 비밀번호 (BCrypt 해시, 평문 저장 금지)
# -------------------------------------------------------
#
# [초기 설정 방법]
# 1) local.properties 에 아래 두 줄을 임시로 추가하고 서버 시작:
#      app.dashboard.generate-hash=true
#      app.dashboard.plain-password=원하는비밀번호
#
# 2) 서버 로그에서 [ADMIN-HASH] 줄의 해시값 복사
#
# 3) local.properties 를 아래처럼 교체 (plain-password 삭제 필수):
#      app.dashboard.password.hash=$2a$12$복사한해시값
#
# 4) generate-hash / plain-password 항목 제거 후 재시작
#
app.dashboard.password.hash=${DASHBOARD_PASSWORD_HASH:}
app.dashboard.generate-hash=${GENERATE_ADMIN_HASH:false}
app.dashboard.plain-password=${ADMIN_PLAIN_PASSWORD:}

# -------------------------------------------------------
# 라이선스 강제 적용 여부
# -------------------------------------------------------
# false(기본) = 라이선스 없이도 접속 가능 (마이그레이션 기간용)
# true         = 라이선스 미할당 또는 비활성 섬은 접속 차단
app.license.enforcement=false
