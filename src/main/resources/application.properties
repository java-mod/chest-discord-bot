spring.config.import=optional:file:./local.properties

server.port=${SERVER_PORT:5000}
spring.profiles.default=h2

# -------------------------------------------------------
# 공통 설정 (민감정보 없음)
# DB 종류는 spring.profiles.active=h2|mysql 로 선택하세요.
# 선택하지 않으면 기본값은 h2 입니다.
# -------------------------------------------------------

# -------------------------------------------------------
# JPA / Hibernate
# ddl-auto=update → 로컬 H2/MySQL 스키마 자동 생성/업데이트
# DB별 URL/driver/dialect 는 application-{profile}.properties 에서 관리
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# 로깅
# -------------------------------------------------------
logging.level.org.hibernate.SQL=warn
logging.level.com.example.chestbot.service.LogMigrationRunner=info
server.error.include-message=always

spring.application.name=changojigi-discord-bot

