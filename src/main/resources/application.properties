spring.config.import=optional:file:./local.properties

server.port=${SERVER_PORT:5000}

# -------------------------------------------------------
# 기본 커밋 설정 (민감정보 없음)
# 실제 실행값은 루트 local.properties 에서 덮어쓰세요.
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/chest_bot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=chest_bot
spring.datasource.password=

# -------------------------------------------------------
# 레거시 H2 파일 → MySQL 최초 마이그레이션
# search-paths: .mv.db 확장자 없는 base path 목록
# -------------------------------------------------------
app.legacy-h2.enabled=true
app.legacy-h2.search-paths=./data/chestbot
app.legacy-h2.primary-username=sa
app.legacy-h2.primary-password=

# -------------------------------------------------------
# JPA / Hibernate
# ddl-auto=update → MySQL 스키마 자동 생성/업데이트
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# 로깅
# -------------------------------------------------------
logging.level.org.hibernate.SQL=warn
logging.level.com.example.chestbot.service.LogMigrationRunner=info

spring.application.name=changojigi-discord-bot
