<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>섬 관리 — 창고지기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0B1320;--surface:#142035;--surface2:#1C2D45;--surface3:#243554;--border:#243550;--gold:#F5A623;--gold2:#D4860A;--teal:#4DD9B8;--red:#FF6B8A;--green:#4CAF7D;--text:#E2EAF4;--muted:#7891AA;--muted2:#4A6280;}
        *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;}
        body{background:var(--bg);background-image:linear-gradient(rgba(245,166,35,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.025) 1px,transparent 1px);background-size:40px 40px;min-height:100vh;color:var(--text);}
        .topnav{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);}
        .nav-brand{font-weight:900;font-size:1.1rem;color:var(--gold);letter-spacing:-.5px;text-decoration:none;display:flex;align-items:center;gap:6px;}
        .nav-brand span{color:var(--text);}
        .nav-links{display:flex;gap:4px;margin-left:8px;}
        .nav-link{color:var(--muted);font-size:.85rem;font-weight:600;padding:6px 14px;border-radius:8px;text-decoration:none;transition:background .15s,color .15s;}
        .nav-link:hover{background:var(--surface2);color:var(--text);}
        .nav-link.active{background:rgba(245,166,35,.15);color:var(--gold);}
        .ms-auto{margin-left:auto;}
        .btn-logout{background:transparent;border:1px solid var(--muted2);color:var(--muted);border-radius:8px;padding:5px 14px;font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s;}
        .btn-logout:hover{border-color:var(--red);color:var(--red);}
        .page{padding:24px;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
        .card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.92rem;}
        .count-badge{background:var(--surface2);color:var(--muted);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}
        .alert-warn{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:12px;padding:12px 18px;font-size:.85rem;color:#F5C842;margin-bottom:20px;}
        .alert-warn a{color:var(--gold);font-weight:700;}
        .alert-success{background:rgba(77,217,184,.08);border:1px solid rgba(77,217,184,.25);border-radius:12px;padding:12px 18px;font-size:.85rem;color:var(--teal);margin-bottom:20px;}
        .table{color:var(--text)!important;margin:0;}
        .table thead th{background:var(--surface2);color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:none!important;padding:12px 16px!important;}
        .table tbody td{border-color:var(--border)!important;padding:11px 16px!important;vertical-align:middle;font-size:.88rem;}
        .table tbody tr:hover td{background:rgba(255,255,255,.02)!important;}
        .lic-key{font-family:monospace;letter-spacing:1.5px;color:#C8D8E8;font-size:.82rem;}
        .join-code{font-family:monospace;color:var(--muted);font-size:.85rem;}
        .badge-on{background:rgba(77,217,184,.15);color:var(--teal);border:1px solid rgba(77,217,184,.3);border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;}
        .badge-off{background:rgba(255,107,138,.15);color:var(--red);border:1px solid rgba(255,107,138,.3);border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;}
        .badge-none{background:rgba(120,145,170,.12);color:var(--muted);border:1px solid rgba(120,145,170,.2);border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;}
        .btn{border-radius:8px!important;font-weight:700!important;font-size:.8rem!important;padding:6px 14px!important;border:none!important;cursor:pointer;transition:opacity .15s,transform .1s;}
        .btn:hover{opacity:.88;} .btn:active{transform:scale(.97);}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff!important;box-shadow:0 3px 12px rgba(245,166,35,.3);}
        .btn-ghost-red{background:transparent!important;border:1px solid rgba(255,107,138,.4)!important;color:var(--red)!important;}
        .btn-ghost-red:hover{background:rgba(255,107,138,.1)!important;}
        .form-select{background:var(--surface2)!important;border:1px solid var(--border)!important;border-radius:8px!important;color:var(--text)!important;padding:6px 12px!important;font-size:.82rem!important;}
        .form-select:focus{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(245,166,35,.12)!important;outline:none!important;}
        .form-select option{background:var(--surface2);}
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard/licenses" class="nav-brand">📦 <span>창고지기</span></a>
    <div class="nav-links">
        <a href="/dashboard/licenses" class="nav-link">🔑 라이선스</a>
        <a href="/dashboard/islands"  class="nav-link active">🏝 섬 관리</a>
    </div>
    <div class="ms-auto">
        <form th:action="@{/dashboard/logout}" method="post" style="display:inline">
            <button class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="page">

    <div th:if="${successMsg}" class="alert-success" th:text="${successMsg}"></div>

    <div th:if="${#lists.isEmpty(availableLicenses)}" class="alert-warn">
        ⚠️ <strong>할당 가능한 라이선스가 없습니다.</strong>
        <a href="/dashboard/licenses">라이선스 페이지</a>에서 먼저 발급하세요.
    </div>

    <div class="card">
        <div class="card-head">
            🏝 섬 목록
            <span class="count-badge" th:text="${#lists.size(islands)} + '개'">0개</span>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>섬 이름</th>
                    <th>참여 코드</th>
                    <th>라이선스 키</th>
                    <th>라이선스 상태</th>
                    <th style="min-width:280px;text-align:center">라이선스 할당</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(islands)}">
                    <td colspan="5" style="text-align:center;padding:48px!important;color:var(--muted)">
                        <div style="font-size:2.5rem;margin-bottom:8px">🏜</div>
                        등록된 섬이 없습니다.
                    </td>
                </tr>
                <tr th:each="island : ${islands}">
                    <td style="font-weight:700" th:text="${island.name}"></td>
                    <td><span class="join-code" th:text="${island.joinCode}"></span></td>
                    <td>
                        <span th:if="${island.hasLicense}" class="lic-key" th:text="${island.licenseKey}"></span>
                        <span th:unless="${island.hasLicense}" style="color:var(--muted2);font-size:.8rem">—</span>
                    </td>
                    <td>
                        <span th:if="${island.hasLicense and island.licenseActive}" class="badge-on">활성</span>
                        <span th:if="${island.hasLicense and !island.licenseActive}" class="badge-off">비활성</span>
                        <span th:unless="${island.hasLicense}" class="badge-none">미할당</span>
                    </td>
                    <td style="text-align:center">
                        <form th:if="${island.hasLicense}"
                              th:action="@{/dashboard/islands/{id}/remove-license(id=${island.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('라이선스 할당을 해제하시겠습니까?')">
                            <button class="btn btn-ghost-red">할당 해제</button>
                        </form>
                        <form th:unless="${island.hasLicense}"
                              th:action="@{/dashboard/islands/{id}/assign-license(id=${island.id})}"
                              method="post" style="display:inline-flex;gap:6px;align-items:center">
                            <select name="licenseId" class="form-select"
                                    style="min-width:210px"
                                    th:disabled="${#lists.isEmpty(availableLicenses)}" required>
                                <option value="" disabled selected>라이선스 선택...</option>
                                <option th:each="avail : ${availableLicenses}"
                                        th:value="${avail.id}"
                                        th:text="${avail.licenseKey} + ' (' + ${avail.islandName} + ')'"></option>
                            </select>
                            <button class="btn btn-gold" th:disabled="${#lists.isEmpty(availableLicenses)}">할당</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
