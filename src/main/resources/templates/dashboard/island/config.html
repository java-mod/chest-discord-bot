<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${island.name} + ' — 창고 설정'">창고 설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0B1320;--surface:#142035;--surface2:#1C2D45;--surface3:#243554;--border:#243550;--gold:#F5A623;--gold2:#D4860A;--teal:#4DD9B8;--teal2:#2EC9A5;--red:#FF6B8A;--text:#E2EAF4;--muted:#7891AA;--muted2:#4A6280;}
        *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;}
        body{background:var(--bg);background-image:linear-gradient(rgba(77,217,184,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(77,217,184,.02) 1px,transparent 1px);background-size:40px 40px;min-height:100vh;color:var(--text);}
        .topnav{background:var(--surface);border-bottom:2px solid var(--teal);padding:0 24px;height:58px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);}
        .nav-brand{font-weight:900;font-size:1.05rem;color:var(--teal);text-decoration:none;display:flex;align-items:center;gap:6px;letter-spacing:-.5px;}
        .nav-brand span{color:var(--text);}
        .island-chip{background:rgba(77,217,184,.12);color:var(--teal);border:1px solid rgba(77,217,184,.25);border-radius:20px;padding:3px 12px;font-size:.78rem;font-weight:700;}
        .nav-links{display:flex;gap:4px;margin-left:12px;}
        .nav-link{color:var(--muted);font-size:.83rem;font-weight:600;padding:6px 14px;border-radius:8px;text-decoration:none;transition:background .15s,color .15s;}
        .nav-link:hover{background:var(--surface2);color:var(--text);}
        .nav-link.active{background:rgba(77,217,184,.15);color:var(--teal);}
        .ms-auto{margin-left:auto;}
        .btn-logout{background:transparent;border:1px solid var(--muted2);color:var(--muted);border-radius:8px;padding:5px 14px;font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s;}
        .btn-logout:hover{border-color:var(--red);color:var(--red);}
        .page{padding:24px;}

        /* ── STAT CHIPS ── */
        .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
        .info-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
        .info-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal2));}
        .info-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
        .info-val{font-size:1.15rem;font-weight:700;font-family:monospace;color:var(--text);}
        .info-card.gold-accent::after{background:linear-gradient(90deg,var(--gold),var(--gold2));}
        .info-card.gold-accent .info-val{color:var(--gold);}

        /* ── CARD ── */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
        .card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.92rem;}
        .count-chip{background:var(--surface2);color:var(--muted);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}
        .empty-state{padding:48px;text-align:center;color:var(--muted);}
        .empty-state .icon{font-size:2.5rem;margin-bottom:8px;}
        .empty-hint{font-size:.82rem;margin-top:6px;color:var(--muted2);}
        .empty-hint code{background:var(--surface2);color:var(--gold);padding:2px 8px;border-radius:6px;font-size:.8rem;}

        /* ── TABLE ── */
        .table{color:var(--text)!important;margin:0;}
        .table thead th{background:var(--surface2);color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:none!important;padding:12px 16px!important;}
        .table tbody td{border-color:var(--border)!important;padding:12px 16px!important;vertical-align:middle;font-size:.88rem;}
        .table tbody tr:hover td{background:rgba(255,255,255,.02)!important;}
        .idx{color:var(--muted2);font-size:.8rem;font-family:monospace;}
        .key-badge{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.25);border-radius:6px;padding:3px 10px;font-size:.78rem;font-weight:700;font-family:monospace;}
        .coord{font-family:monospace;color:#8BBEDC;font-size:.85rem;letter-spacing:.5px;}
        .world-chip{background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.75rem;}
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard/island/logs" class="nav-brand">📦 <span>창고지기</span></a>
    <span class="island-chip" th:text="${island.name}"></span>
    <div class="nav-links">
        <a class="nav-link" th:href="@{/dashboard/island/logs}">📋 창고 로그</a>
        <a class="nav-link" th:href="@{/dashboard/island/bank}">💰 은행 로그</a>
        <a class="nav-link active" th:href="@{/dashboard/island/config}">⚙ 창고 설정</a>
    </div>
    <div class="ms-auto">
        <form th:action="@{/dashboard/island/logout}" method="post" style="display:inline">
            <button class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="page">

    <!-- 섬 정보 카드 -->
    <div class="info-grid">
        <div class="info-card">
            <div class="info-label">섬 이름</div>
            <div class="info-val" th:text="${island.name}"></div>
        </div>
        <div class="info-card">
            <div class="info-label">참여 코드</div>
            <div class="info-val" th:text="${island.joinCode}"></div>
        </div>
        <div class="info-card gold-accent">
            <div class="info-label">설정 버전</div>
            <div class="info-val">
                <span th:text="'v' + ${config.configVersion}"></span>
                <span style="font-size:.75rem;color:var(--muted);margin-left:6px;font-family:'Noto Sans KR',sans-serif"
                      th:text="${#lists.size(config.chests)} + '개 창고'"></span>
            </div>
        </div>
    </div>

    <!-- 창고 목록 -->
    <div class="card">
        <div class="card-head">
            📦 등록된 창고 목록
            <span class="count-chip" th:text="${#lists.size(config.chests)} + '개'"></span>
        </div>

        <div th:if="${#lists.isEmpty(config.chests)}" class="empty-state">
            <div class="icon">📭</div>
            <div>등록된 창고가 없습니다.</div>
            <div class="empty-hint">게임 내에서 <code>/창고봇 관리자</code> 명령어로 창고를 등록하세요.</div>
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(config.chests)}">
            <table class="table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>창고 키</th>
                    <th>표시 이름</th>
                    <th>좌표 (X, Y, Z)</th>
                    <th>월드</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="chest, stat : ${config.chests}">
                    <td class="idx" th:text="${stat.index + 1}"></td>
                    <td><span class="key-badge" th:text="${chest.chestKey}"></span></td>
                    <td style="font-weight:600" th:text="${chest.displayName}"></td>
                    <td class="coord" th:text="${chest.x} + ',  ' + ${chest.y} + ',  ' + ${chest.z}"></td>
                    <td>
                        <span th:if="${chest.worldHint != null}" class="world-chip" th:text="${chest.worldHint}"></span>
                        <span th:unless="${chest.worldHint != null}" style="color:var(--muted2)">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
