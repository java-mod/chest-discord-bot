<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>라이선스 관리 — 창고지기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0B1320; --surface:#142035; --surface2:#1C2D45; --surface3:#243554;
            --border:#243550; --gold:#F5A623; --gold2:#D4860A;
            --teal:#4DD9B8; --red:#FF6B8A; --green:#4CAF7D;
            --text:#E2EAF4; --muted:#7891AA; --muted2:#4A6280;
        }
        *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;}
        body{background:var(--bg);background-image:linear-gradient(rgba(245,166,35,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.025) 1px,transparent 1px);background-size:40px 40px;min-height:100vh;color:var(--text);}

        /* ── NAV ── */
        .topnav{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);}
        .nav-brand{font-weight:900;font-size:1.1rem;color:var(--gold);letter-spacing:-.5px;text-decoration:none;display:flex;align-items:center;gap:6px;}
        .nav-brand span{color:var(--text);}
        .nav-links{display:flex;gap:4px;margin-left:8px;}
        .nav-link{color:var(--muted);font-size:.85rem;font-weight:600;padding:6px 14px;border-radius:8px;text-decoration:none;transition:background .15s,color .15s;}
        .nav-link:hover{background:var(--surface2);color:var(--text);}
        .nav-link.active{background:rgba(245,166,35,.15);color:var(--gold);}
        .ms-auto{margin-left:auto;}
        .btn-logout{background:transparent;border:1px solid var(--muted2);color:var(--muted);border-radius:8px;padding:5px 14px;font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s;}
        .btn-logout:hover{border-color:var(--red);color:var(--red);}

        /* ── LAYOUT ── */
        .page{padding:24px;}

        /* ── STAT CARDS ── */
        .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden;}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
        .stat-card.gold::before{background:linear-gradient(90deg,var(--gold),var(--gold2));}
        .stat-card.teal::before{background:linear-gradient(90deg,var(--teal),#2EC9A5);}
        .stat-card.purple::before{background:linear-gradient(90deg,#9B5CF6,#7C3AED);}
        .stat-val{font-size:2.2rem;font-weight:900;line-height:1;}
        .stat-card.gold .stat-val{color:var(--gold);}
        .stat-card.teal .stat-val{color:var(--teal);}
        .stat-card.purple .stat-val{color:#A78BFA;}
        .stat-label{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
        .stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:2.4rem;opacity:.12;}

        /* ── CARD ── */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
        .card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.92rem;}
        .card-body-pad{padding:20px;}
        .count-badge{background:var(--surface2);color:var(--muted);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}

        /* ── FORM INPUTS ── */
        .form-label{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
        .form-control,.form-select{background:var(--surface2)!important;border:1px solid var(--border)!important;border-radius:10px!important;color:var(--text)!important;padding:9px 14px!important;font-size:.9rem!important;transition:border-color .2s,box-shadow .2s;}
        .form-control::placeholder{color:var(--muted2);}
        .form-control:focus,.form-select:focus{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(245,166,35,.12)!important;outline:none!important;}
        .form-select option{background:var(--surface2);color:var(--text);}

        /* ── BUTTONS ── */
        .btn{border-radius:8px!important;font-weight:700!important;font-size:.8rem!important;padding:6px 14px!important;border:none!important;cursor:pointer;transition:opacity .15s,transform .1s;}
        .btn:hover{opacity:.88;}
        .btn:active{transform:scale(.97);}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff!important;box-shadow:0 3px 12px rgba(245,166,35,.3);}
        .btn-teal{background:linear-gradient(135deg,var(--teal),#2EC9A5);color:#fff!important;box-shadow:0 3px 12px rgba(77,217,184,.3);}
        .btn-warn{background:linear-gradient(135deg,#FFB347,#E8940A);color:#fff!important;}
        .btn-danger{background:linear-gradient(135deg,var(--red),#E8405A);color:#fff!important;}
        .btn-ghost{background:transparent!important;border:1px solid var(--muted2)!important;color:var(--muted)!important;}
        .btn-ghost:hover{border-color:var(--red)!important;color:var(--red)!important;}
        .btn-lg-gold{padding:10px 0!important;font-size:.92rem!important;width:100%;}

        /* ── TABLE ── */
        .table{color:var(--text)!important;margin:0;}
        .table thead th{background:var(--surface2);color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:none!important;padding:12px 16px!important;}
        .table tbody td{border-color:var(--border)!important;padding:11px 16px!important;vertical-align:middle;font-size:.88rem;}
        .table tbody tr{border-color:var(--border)!important;transition:background .1s;}
        .table tbody tr:hover td{background:rgba(255,255,255,.02)!important;}
        .lic-key{font-family:monospace;letter-spacing:1.5px;color:#C8D8E8;font-size:.85rem;}

        /* ── BADGES ── */
        .badge-on {background:rgba(77,217,184,.15);color:var(--teal);border:1px solid rgba(77,217,184,.3);border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;}
        .badge-off{background:rgba(255,107,138,.15);color:var(--red);border:1px solid rgba(255,107,138,.3);border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;}

        /* ── ALERT ── */
        .alert-issued{background:rgba(77,217,184,.08);border:1px solid rgba(77,217,184,.25);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
        .alert-issued .lic-issued{font-size:1.3rem;font-family:monospace;letter-spacing:2px;color:var(--teal);font-weight:900;}
        .alert-issued .sub{font-size:.78rem;color:var(--muted);margin-top:3px;}
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard/licenses" class="nav-brand">📦 <span>창고지기</span></a>
    <div class="nav-links">
        <a href="/dashboard/licenses" class="nav-link active">🔑 라이선스</a>
        <a href="/dashboard/islands"  class="nav-link">🏝 섬 관리</a>
    </div>
    <div class="ms-auto">
        <form th:action="@{/dashboard/logout}" method="post" style="display:inline">
            <button class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="page">

    <!-- 발급 완료 알림 -->
    <div th:if="${issuedKey}" class="alert-issued">
        <span style="font-size:2rem">✅</span>
        <div>
            <div style="font-weight:700;color:var(--teal)">새 라이선스 발급 완료
                <span style="color:var(--text);font-weight:400" th:text="' — ' + ${issuedIsland}"></span>
            </div>
            <div class="lic-issued" th:text="${issuedKey}"></div>
            <div class="sub">위 키를 섬장에게 전달하세요.</div>
        </div>
    </div>

    <!-- 통계 -->
    <div class="stat-grid">
        <div class="stat-card gold">
            <span class="stat-icon">🔑</span>
            <div class="stat-val" th:text="${totalLicenses}">0</div>
            <div class="stat-label">전체 라이선스</div>
        </div>
        <div class="stat-card teal">
            <span class="stat-icon">✅</span>
            <div class="stat-val" th:text="${activeLicenses}">0</div>
            <div class="stat-label">활성</div>
        </div>
        <div class="stat-card purple">
            <span class="stat-icon">🏝</span>
            <div class="stat-val" th:text="${assignedLicenses}">0</div>
            <div class="stat-label">섬 할당됨</div>
        </div>
    </div>

    <!-- 발급 폼 -->
    <div class="card">
        <div class="card-head">✨ 새 라이선스 발급</div>
        <div class="card-body-pad">
            <form th:action="@{/dashboard/licenses/issue}" method="post" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">섬 이름 <span style="color:var(--red)">*</span></label>
                    <input type="text" name="islandName" class="form-control" placeholder="예: 알파섬" maxlength="120" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">메모 (선택)</label>
                    <input type="text" name="ownerNote" class="form-control" placeholder="예: 홍길동 섬장" maxlength="255">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-gold btn-lg-gold">발급하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 목록 -->
    <div class="card">
        <div class="card-head">
            🔑 라이선스 목록
            <span class="count-badge" th:text="${totalLicenses} + '개'">0개</span>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>라이선스 키</th>
                    <th>섬 이름</th>
                    <th>할당된 섬</th>
                    <th>상태</th>
                    <th>메모</th>
                    <th>생성일</th>
                    <th>마지막 사용</th>
                    <th style="text-align:center">작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(licenses)}">
                    <td colspan="8" style="text-align:center;padding:48px!important;color:var(--muted)">
                        <div style="font-size:2.5rem;margin-bottom:8px">📭</div>
                        발급된 라이선스가 없습니다.
                    </td>
                </tr>
                <tr th:each="lic : ${licenses}">
                    <td><span class="lic-key" th:text="${lic.licenseKey}"></span></td>
                    <td style="font-weight:600" th:text="${lic.islandName}"></td>
                    <td>
                        <span th:if="${lic.assignedIslandName != null}" style="color:var(--teal);font-weight:600" th:text="${lic.assignedIslandName}"></span>
                        <span th:unless="${lic.assignedIslandName != null}" style="color:var(--muted2);font-size:.8rem">미할당</span>
                    </td>
                    <td>
                        <span th:if="${lic.active}" class="badge-on">활성</span>
                        <span th:unless="${lic.active}" class="badge-off">비활성</span>
                    </td>
                    <td style="color:var(--muted);font-size:.82rem" th:text="${lic.ownerNote != null ? lic.ownerNote : '—'}"></td>
                    <td style="color:var(--muted);font-size:.8rem" th:text="${lic.createdAt}"></td>
                    <td style="color:var(--muted2);font-size:.8rem" th:text="${lic.lastUsedAt}"></td>
                    <td style="text-align:center">
                        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
                            <form th:if="${lic.active}"
                                  th:action="@{/dashboard/licenses/{id}/revoke(id=${lic.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('라이선스를 비활성화하시겠습니까?')">
                                <button class="btn btn-warn">비활성화</button>
                            </form>
                            <form th:unless="${lic.active}"
                                  th:action="@{/dashboard/licenses/{id}/activate(id=${lic.id})}"
                                  method="post" style="display:inline">
                                <button class="btn btn-teal">활성화</button>
                            </form>
                            <form th:action="@{/dashboard/licenses/{id}/delete(id=${lic.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('라이선스를 완전히 삭제하시겠습니까?\n할당된 섬의 라이선스도 해제됩니다.')">
                                <button class="btn btn-ghost">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
