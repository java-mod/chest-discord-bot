name: Release changojigi-discord-bot

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Determine next version
        id: tag
        shell: bash
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${LATEST#v}"
            VERSION="$major.$minor.$((patch + 1))"
          fi

          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "▶ 다음 릴리즈 버전: $TAG (이전: ${LATEST:-없음})"

      - name: Build release jar
        run: ./gradlew clean build -Prelease_version=${{ steps.tag.outputs.version }}

      - name: Stage release jars
        shell: bash
        run: |
          mkdir -p release-jars
          find build/libs -name "*.jar" ! -name "*-plain.jar" ! -name "*-sources.jar" -exec cp {} release-jars/ \;
          echo "── Release JARs ──"
          ls -lh release-jars/
          if [ -z "$(ls -A release-jars/)" ]; then
            echo "::error::릴리즈할 JAR 파일이 없습니다."
            exit 1
          fi

      - name: Push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-jars/*.jar
          fail_on_unmatched_files: true
